# Security Policy

The Discipleship Tools team takes security and member privacy seriously.

If you discover a security vulnerability, please **do not open a public GitHub issue**.

Instead, report the vulnerability privately so we can investigate and resolve it responsibly.

## Reporting a Vulnerability

Please email:

security@discipleship-tools.com

Include the following details if possible:

- Description of the vulnerability
- Steps to reproduce
- Potential impact
- Screenshots or logs if available

You will receive confirmation that we received your report.

## Responsible Disclosure

We ask that you:

- Give us reasonable time to investigate and fix the issue
- Avoid publicly disclosing the vulnerability until it has been resolved

We appreciate your help protecting churches and their members.
