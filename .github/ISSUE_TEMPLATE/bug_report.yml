name: Bug Report
description: Report a problem or unexpected behavior in Discipleship Tools
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Discipleship Tools.

        Please provide as much detail as possible so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the issue.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Scroll to...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
      
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What should actually happened?
      
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: If applicable, add screenshots or logs.

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome, Safari, Firefox

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Mac, Windows, iPhone

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem.
