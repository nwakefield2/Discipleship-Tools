name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping shape the future of Discipleship Tools.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem does this feature solve?
      placeholder: I wish there was a way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, diagrams, or examples.
